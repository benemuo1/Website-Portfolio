<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLVCK — Streetwear</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#000;font-family:'Space Mono',monospace;overflow-x:hidden}
body.dark{background:#000;color:#fff}
nav{position:fixed;top:0;width:100%;padding:1.2rem 3rem;display:flex;justify-content:space-between;align-items:center;z-index:100;mix-blend-mode:difference;color:#fff}
nav .logo{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:.1em}
nav a{color:inherit;text-decoration:none;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase}
nav ul{display:flex;gap:2rem;list-style:none}
.hero{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#000;color:#fff}
.hero-img{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1556906781-9a412961c28c?w=1200') center/cover;opacity:.4;clip-path:inset(0)}
.hero h1{font-family:'Oswald',sans-serif;font-size:clamp(5rem,15vw,12rem);font-weight:700;line-height:.85;text-align:center;position:relative;z-index:2;letter-spacing:.05em}
.hero h1 .red{color:#e63946}
.drops{padding:6rem 3rem;background:#fff;color:#000}
.drops.dark{background:#000;color:#fff}
.drops h2{font-family:'Oswald',sans-serif;font-size:3rem;margin-bottom:3rem;text-transform:uppercase;letter-spacing:.05em}
.drop-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.drop-item{position:relative;overflow:hidden;height:500px;border:1px solid #111}
.drop-item img{width:100%;height:100%;object-fit:cover;clip-path:inset(100% 0 0 0);filter:grayscale(100%);transition:filter .5s}
.drop-item:hover img{filter:grayscale(0%)}
.drop-item .info{position:absolute;bottom:0;left:0;right:0;padding:2rem;z-index:2}
.drop-item .info h3{font-family:'Oswald',sans-serif;font-size:1.5rem;text-transform:uppercase}
.drop-item .info .price{color:#e63946;font-size:1.2rem;font-weight:700;margin-top:.3rem}
.drop-item .info span{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#888}
.drop-item .tag{position:absolute;top:1.5rem;left:1.5rem;padding:.3rem .8rem;background:#e63946;color:#fff;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;z-index:2}
.manifesto{padding:8rem 3rem;text-align:center}
.manifesto h2{font-family:'Oswald',sans-serif;font-size:clamp(2rem,5vw,4rem);text-transform:uppercase;line-height:1.3;max-width:700px;margin:0 auto}
.manifesto h2 .red{color:#e63946}
.lookbook{padding:4rem 3rem}
.lookbook h2{font-family:'Oswald',sans-serif;font-size:2rem;text-transform:uppercase;margin-bottom:2rem;letter-spacing:.05em}
.look-row{display:flex;gap:1rem;height:400px}
.look-img{flex:1;overflow:hidden;position:relative}
.look-img img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%);transition:filter .4s}
.look-img:hover img{filter:grayscale(0%)}
.look-img .num{position:absolute;bottom:1rem;right:1rem;font-family:'Oswald',sans-serif;font-size:3rem;color:rgba(255,255,255,.1)}
footer{padding:2rem 3rem;display:flex;justify-content:space-between;font-size:.6rem;letter-spacing:.15em;color:#888;border-top:1px solid #222}

@media(max-width:768px){
nav{padding:1rem 1.5rem}
nav ul{display:none}
.hero h1{font-size:clamp(3rem,12vw,6rem)}
.drops{padding:4rem 1.5rem}
.drop-grid{grid-template-columns:1fr}
.drop-item{height:350px}
.manifesto{padding:4rem 1.5rem}
.manifesto h2{font-size:clamp(1.5rem,5vw,2.5rem)}
.lookbook{padding:4rem 1.5rem}
.look-row{flex-direction:column;height:auto}
.look-img{height:250px}
footer{padding:1.5rem;flex-direction:column;gap:.5rem;text-align:center}
}
</style>
</head>
<body>
<nav><div class="logo">BLVCK</div><ul><li><a href="#drops">Drops</a></li><li><a href="#lookbook">Lookbook</a></li><li><a href="#">About</a></li></ul></nav>

<section class="hero"><div class="hero-img"></div><h1>NO<br>RULES<br><span class="red">.</span></h1></section>

<section class="drops" id="drops">
<h2>Latest Drops</h2>
<div class="drop-grid">
<div class="drop-item"><div class="tag">New</div><img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600" alt=""><div class="info"><span>Drop 001</span><h3>Oversized Hoodie</h3><div class="price">$120</div></div></div>
<div class="drop-item"><img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600" alt=""><div class="info"><span>Drop 002</span><h3>Cargo Pants</h3><div class="price">$95</div></div></div>
<div class="drop-item"><img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600" alt=""><div class="info"><span>Drop 003</span><h3>Bomber Jacket</h3><div class="price">$185</div></div></div>
<div class="drop-item"><div class="tag">Sold Out</div><img src="https://images.unsplash.com/photo-1434389677669-e08b4cda3a0a?w=600" alt=""><div class="info"><span>Drop 004</span><h3>Graphic Tee</h3><div class="price">$55</div></div></div>
</div>
</section>

<section class="manifesto"><h2>We don't follow trends.<br>We <span class="red">burn</span> them.</h2></section>

<section class="lookbook" id="lookbook">
<h2>Lookbook</h2>
<div class="look-row">
<div class="look-img"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400" alt=""><div class="num">01</div></div>
<div class="look-img"><img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=400" alt=""><div class="num">02</div></div>
<div class="look-img"><img src="https://images.unsplash.com/photo-1539635278303-d4002c07eae3?w=400" alt=""><div class="num">03</div></div>
</div>
</section>

<footer><span>© 2024 BLVCK</span><span>NYC · TOKYO · LONDON</span></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// Hero clip-path wipe
gsap.from('.hero-img',{clipPath:'inset(0 100% 0 0)',duration:1.5,ease:'power4.inOut',delay:.3});
gsap.from('.hero h1',{y:80,opacity:0,duration:1,delay:1});

// toggleClass — body goes dark when drops section enters
ScrollTrigger.create({trigger:'#drops',start:'top 50%',end:'bottom 50%',toggleClass:{targets:'body',className:'dark'}});

// Drop items — clip-path wipe reveal on each image
gsap.utils.toArray('.drop-item').forEach((item,i)=>{
  const img=item.querySelector('img');
  const directions=['inset(100% 0 0 0)','inset(0 100% 0 0)','inset(0 0 100% 0)','inset(0 0 0 100%)'];
  gsap.to(img,{clipPath:'inset(0)',duration:1.2,ease:'power4.inOut',
    scrollTrigger:{trigger:item,start:'top 80%'}
  });
  gsap.set(img,{clipPath:directions[i%4]});
  gsap.from(item.querySelectorAll('.info > *'),{scrollTrigger:{trigger:item,start:'top 70%'},y:15,opacity:0,stagger:.08,duration:.5,delay:.6});
  const tag=item.querySelector('.tag');
  if(tag) gsap.from(tag,{scrollTrigger:{trigger:item,start:'top 75%'},scale:0,duration:.4,ease:'back.out(2)',delay:.8});
});

// Manifesto
gsap.from('.manifesto h2',{scrollTrigger:{trigger:'.manifesto',start:'top 65%'},y:50,opacity:0,duration:1});

// Lookbook — clip-path wipe from bottom
gsap.utils.toArray('.look-img').forEach((img,i)=>{
  gsap.from(img,{scrollTrigger:{trigger:img,start:'top 80%'},clipPath:'inset(100% 0 0 0)',duration:1,ease:'power4.inOut',delay:i*.15});
});
</script>
</body>
</html>
